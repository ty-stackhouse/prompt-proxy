server:
  host: "127.0.0.1"
  port: 8000
  max_request_size: 1048576  # 1MB
  max_text_length: 100000

backend:
  type: "stub"  # or "litellm"
  litellm:
    model: "gpt-3.5-turbo"
    api_key: ""  # Set in environment or here

fail_open: true

logging:
  level: "INFO"
  log_raw_prompt: false

filters:
  - name: "semantic_filter"
    enabled: true
    entities: ["PERSON", "EMAIL_ADDRESS", "LOCATION"]
  - name: "regex_filter"
    enabled: true
    rules:
      - name: "codenames"
        pattern: "\\b(code|secret)\\w+\\b"
        replacement: "[REDACTED_CODENAME]"
      - name: "accounts"
        pattern: "\\baccount\\d+\\b"
        replacement: "[ACCOUNT_ID]"
  - name: "denylist_filter"
    enabled: true
    rules:
      - phrase: "bad phrase"
        action: "reject"
        message: "This phrase is not allowed."
      - phrase: "another bad"
        action: "replace"
        replacement: "[FILTERED]"
  - name: "intercept_filter"
    enabled: false